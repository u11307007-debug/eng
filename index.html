<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    :root { --primary: #4285f4; --correct: #2e7d32; --wrong: #d32f2f; --bg: #f8f9fa; }
    body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
    #topic-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-width: 500px; }
    .topic-btn { background: white; border: 1px solid #ddd; padding: 15px; border-radius: 8px; cursor: pointer; }
    #practice-area { display: none; background: white; padding: 20px; border-radius: 15px; text-align: center; width: 90%; max-width: 500px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    #sentence-display { font-size: 24px; margin: 20px 0; min-height: 60px; }
    .word { margin: 0 3px; display: inline-block; }
    .word.correct { color: var(--correct); font-weight: bold; }
    .word.wrong { color: var(--wrong); font-weight: bold; text-decoration: underline; }
    .controls { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
    .icon-btn { border: none; background: #eee; border-radius: 50%; width: 60px; height: 60px; cursor: pointer; }
    .icon-btn.active { background: #ffcccc; animation: pulse 1s infinite; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
  </style>
</head>
<body>

  <h1>AI 英語教室</h1>

  <div id="topic-container">
    <button class="topic-btn" onclick="start('旅遊')">旅遊</button>
    <button class="topic-btn" onclick="start('商務')">商務</button>
    <button class="topic-btn" onclick="start('食物')">食物</button>
    <button class="topic-btn" onclick="start('社交')">社交</button>
  </div>

  <div id="practice-area">
    <div id="sentence-display">載入中...</div>
    <div class="controls">
      <button class="icon-btn" onclick="playTTS()"><span class="material-icons">volume_up</span></button>
      <button id="mic-btn" class="icon-btn" onclick="toggleMic()"><span class="material-icons">mic</span></button>
    </div>
    <div id="status"></div>
    <button id="next-btn" style="display:none; padding:10px 20px;" onclick="next()">下一題</button>
  </div>

  <script>
    // 🔴 重要：請在這裡貼上你「部署網頁應用程式」後的 URL
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwITPLgmoAASQFRILIAB8wsbYI2kLjv8wmJ7TJRzNqRKe10AKV9x2-A7g3po1IqDd6R/exec"; 

    let sentences = [];
    let currentIdx = 0;
    let recognition;
    let isRecording = false;

    async function start(topic) {
      if (GAS_URL === "你的_GAS_部署網址_放在這裡") {
        alert("請先在 HTML 程式碼中填入 GAS_URL！");
        return;
      }

      document.getElementById('topic-container').style.display = 'none';
      document.getElementById('practice-area').style.display = 'block';
      
      try {
        // 使用 fetch 呼叫 GAS (使用 POST 避開快取)
        const response = await fetch(`${GAS_URL}?topic=${topic}`, { method: 'POST' });
        const result = await response.json();
        
        if (result.status === "success") {
          sentences = result.data;
          render();
          initSTT();
        } else {
          alert("錯誤: " + result.message);
        }
      } catch (e) {
        alert("連線失敗，請檢查 GAS 部署是否設為「任何人」都可以存取。");
      }
    }

    function initSTT() {
      const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new Speech();
      recognition.lang = 'en-US';
      recognition.onresult = (e) => {
        isRecording = false;
        document.getElementById('mic-btn').classList.remove('active');
        compare(e.results[0][0].transcript);
      };
    }

    function render() {
      document.getElementById('sentence-display').innerHTML = sentences[currentIdx].split(' ').map(w => `<span class="word">${w}</span>`).join(' ');
      document.getElementById('next-btn').style.display = 'none';
      playTTS();
    }

    function playTTS() {
      const u = new SpeechSynthesisUtterance(sentences[currentIdx]);
      u.lang = 'en-US';
      speechSynthesis.speak(u);
    }

    function toggleMic() {
      if (isRecording) { recognition.stop(); return; }
      isRecording = true;
      document.getElementById('mic-btn').classList.add('active');
      document.querySelectorAll('.word').forEach(w => w.className = 'word');
      recognition.start();
    }

    function compare(speech) {
      const spoken = speech.toLowerCase().replace(/[.,!?;]/g, '').split(' ');
      const spans = document.querySelectorAll('.word');
      spans.forEach(span => {
        const target = span.innerText.toLowerCase().replace(/[.,!?;]/g, '');
        span.classList.add(spoken.includes(target) ? 'correct' : 'wrong');
      });
      document.getElementById('status').innerText = `辨識結果: ${speech}`;
      document.getElementById('next-btn').style.display = 'inline-block';
    }

    function next() {
      currentIdx++;
      if (currentIdx < sentences.length) render();
      else { alert("完成！"); location.reload(); }
    }
  </script>
</body>
</html>
