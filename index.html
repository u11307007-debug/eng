<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
      :root { --primary: #4285f4; --correct: #2e7d32; --wrong: #d32f2f; --bg: #f8f9fa; }
      body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
      h1 { color: var(--primary); margin-bottom: 20px; }
      
      /* 主題選單 */
      #topic-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-width: 600px; width: 100%; }
      @media (min-width: 600px) { #topic-container { grid-template-columns: repeat(5, 1fr); } }
      .topic-btn { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 15px 5px; cursor: pointer; transition: 0.2s; }
      .topic-btn:hover { border-color: var(--primary); background: #e8f0fe; }

      /* 練習區域 */
      #practice-area { display: none; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 600px; width: 100%; text-align: center; margin-top: 10px; }
      #sentence-display { font-size: 26px; margin: 25px 0; min-height: 80px; line-height: 1.4; color: #333; }
      .word { margin: 0 4px; display: inline-block; transition: 0.3s; }
      .word.correct { color: var(--correct); font-weight: bold; }
      .word.wrong { color: var(--wrong); font-weight: bold; text-decoration: underline; }
      
      /* 控制按鈕 */
      .controls { display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
      .icon-btn { border: none; background: #f0f0f0; border-radius: 50%; width: 64px; height: 64px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
      .icon-btn:hover { background: #e0e0e0; }
      .icon-btn.active { background: #ffcccc; animation: pulse 1.5s infinite; }
      .material-icons { font-size: 32px; color: #555; }
      
      #status { margin-top: 10px; color: #666; font-size: 14px; min-height: 20px; }
      #next-btn { background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 25px; cursor: pointer; display: none; margin: 20px auto 0; font-size: 16px; }
      
      @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(211, 47, 47, 0); } 100% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0); } }
    </style>
  </head>
  <body>
    <h1>AI 英語發音練習</h1>
    
    <div id="topic-container">
      <button class="topic-btn" onclick="startFlow('旅遊 Travel')">旅遊</button>
      <button class="topic-btn" onclick="startFlow('商務 Business')">商務</button>
      <button class="topic-btn" onclick="startFlow('餐廳 Dining')">餐廳</button>
      <button class="topic-btn" onclick="startFlow('購物 Shopping')">購物</button>
      <button class="topic-btn" onclick="startFlow('交通 Transit')">交通</button>
      <button class="topic-btn" onclick="startFlow('飯店 Hotel')">飯店</button>
      <button class="topic-btn" onclick="startFlow('社交 Social')">社交</button>
      <button class="topic-btn" onclick="startFlow('醫療 Health')">醫療</button>
      <button class="topic-btn" onclick="startFlow('愛好 Hobby')">興趣</button>
      <button class="topic-btn" onclick="startFlow('自我介紹 Intro')">自我介紹</button>
    </div>

    <div id="practice-area">
      <div id="info" style="color:#aaa; font-size:12px; letter-spacing: 1px;">載入中...</div>
      <div id="sentence-display">正在為您準備題目...</div>
      
      <div class="controls">
        <button class="icon-btn" onclick="playTTS()" title="聽示範"><span class="material-icons">volume_up</span></button>
        <button id="mic-btn" class="icon-btn" onclick="handleMicClick()" title="開始錄音"><span class="material-icons">mic</span></button>
      </div>
      
      <div id="status"></div>
      <button id="next-btn" onclick="goNext()">下一題</button>
      <p style="margin-top:30px;"><a href="#" onclick="location.reload()" style="color:#bbb; text-decoration:none; font-size:12px;">← 返回主題選單</a></p>
    </div>

    <script>
      let sentences = [];
      let currentIdx = 0;
      let recognition;
      let isRecording = false;

      // 初始化語音辨識
      function initRecognition() {
        if (!('webkitSpeechRecognition' in window)) return;
        recognition = new webkitSpeechRecognition();
        recognition.lang = 'en-US';
        recognition.onresult = (e) => {
          stopMicStyle();
          compare(e.results[0][0].transcript);
        };
        recognition.onerror = () => stopMicStyle();
        recognition.onend = () => stopMicStyle();
      }

      // 啟動流程：立刻換頁，背景抓題
      function startFlow(topic) {
        document.getElementById('topic-container').style.display = 'none';
        document.getElementById('practice-area').style.display = 'block';
        initRecognition();

        google.script.run
          .withSuccessHandler(data => {
            if (data[0].startsWith("Error")) {
              alert("出錯了: " + data[0]);
              location.reload();
              return;
            }
            sentences = data;
            render();
          })
          .getGeminiSentences(topic);
      }

      function render() {
        if (currentIdx < sentences.length) {
          document.getElementById('info').innerText = `STEP ${currentIdx + 1} / 5`;
          const text = sentences[currentIdx];
          document.getElementById('sentence-display').innerHTML = text.split(' ').map(w => `<span class="word">${w}</span>`).join(' ');
          document.getElementById('next-btn').style.display = 'none';
          document.getElementById('status').innerText = "點擊麥克風開始朗讀";
          playTTS();
        } else {
          alert("🎉 太棒了！你完成了所有練習。");
          location.reload();
        }
      }

      function playTTS() {
        if (!sentences[currentIdx]) return;
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(sentences[currentIdx]);
        u.lang = 'en-US';
        u.rate = 0.85;
        speechSynthesis.speak(u);
      }

      async function handleMicClick() {
        if (isRecording) { recognition.stop(); return; }
        try {
          await navigator.mediaDevices.getUserMedia({ audio: true });
          isRecording = true;
          document.getElementById('mic-btn').classList.add('active');
          document.querySelectorAll('.word').forEach(s => s.className = 'word');
          document.getElementById('status').innerText = "聆聽中...";
          recognition.start();
        } catch (e) {
          alert("請授權麥克風以進行練習。");
        }
      }

      function stopMicStyle() {
        isRecording = false;
        document.getElementById('mic-btn').classList.remove('active');
      }

      function compare(speech) {
        const clean = (t) => t.toLowerCase().replace(/[.,!?;]/g, '').trim();
        const spokenWords = clean(speech).split(' ');
        const spans = document.querySelectorAll('.word');
        
        spans.forEach(span => {
          const target = clean(span.innerText);
          // 只要講出的內容包含該單字就給綠色
          if (spokenWords.includes(target)) span.classList.add('correct');
          else span.classList.add('wrong');
        });
        
        document.getElementById('status').innerText = `你說的是: "${speech}"`;
        document.getElementById('next-btn').style.display = 'block';
      }

      function goNext() { currentIdx++; render(); }
    </script>
  </body>
</html>
