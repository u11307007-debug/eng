<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
      :root { --primary: #4285f4; --correct: #2e7d32; --wrong: #d32f2f; --bg: #f8f9fa; }
      body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
      h1 { color: var(--primary); }
      #topic-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-width: 600px; width: 100%; margin-top: 20px; }
      @media (min-width: 600px) { #topic-container { grid-template-columns: repeat(5, 1fr); } }
      .topic-btn { background: white; border: 1px solid #ccc; border-radius: 8px; padding: 15px 5px; cursor: pointer; transition: 0.2s; font-size: 14px; }
      .topic-btn:hover { border-color: var(--primary); background: #e8f0fe; }
      
      #practice-area { display: none; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 600px; width: 100%; text-align: center; margin-top: 20px; }
      #sentence-display { font-size: 24px; margin: 20px 0; min-height: 60px; line-height: 1.5; }
      .word { margin: 0 3px; display: inline-block; color: #333; }
      .word.correct { color: var(--correct); font-weight: bold; }
      .word.wrong { color: var(--wrong); font-weight: bold; text-decoration: underline; }
      
      .controls { display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
      .icon-btn { border: none; background: #eee; border-radius: 50%; width: 60px; height: 60px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
      .icon-btn:hover { background: #ddd; }
      .icon-btn.active { background: #ffcccc; animation: pulse 1.5s infinite; }
      .material-icons { font-size: 32px; }
      
      #next-btn { background: var(--primary); color: white; border: none; padding: 10px 25px; border-radius: 20px; cursor: pointer; display: none; margin: 0 auto; }
      #loading { display: none; color: #666; margin-top: 50px; }
      @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(211, 47, 47, 0); } 100% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0); } }
    </style>
  </head>
  <body>
    <h1>AI 英語發音練習</h1>
    
    <div id="topic-container">
      <button class="topic-btn" onclick="init('旅遊 Travel')">旅遊</button>
      <button class="topic-btn" onclick="init('商務 Business')">商務</button>
      <button class="topic-btn" onclick="init('餐廳 Dining')">餐廳</button>
      <button class="topic-btn" onclick="init('購物 Shopping')">購物</button>
      <button class="topic-btn" onclick="init('交通 Transit')">交通</button>
      <button class="topic-btn" onclick="init('飯店 Hotel')">飯店</button>
      <button class="topic-btn" onclick="init('社交 Social')">社交</button>
      <button class="topic-btn" onclick="init('醫療 Health')">醫療</button>
      <button class="topic-btn" onclick="init('愛好 Hobby')">興趣</button>
      <button class="topic-btn" onclick="init('自我介紹 Intro')">自我介紹</button>
    </div>

    <div id="loading">Gemini 正在為您出題...</div>

    <div id="practice-area">
      <div id="info" style="color:#888; font-size:12px;"></div>
      <div id="sentence-display"></div>
      <div class="controls">
        <button class="icon-btn" onclick="playTTS()"><span class="material-icons">volume_up</span></button>
        <button id="mic-btn" class="icon-btn" onclick="toggleMic()"><span class="material-icons">mic</span></button>
      </div>
      <div id="status" style="margin-bottom:15px; color:#555;"></div>
      <button id="next-btn" onclick="goNext()">下一題</button>
      <p><a href="#" onclick="location.reload()" style="color:#999; font-size:12px;">返回主選單</a></p>
    </div>

    <script>
      let sentences = [];
      let currentIdx = 0;
      let recognition;
      let isRecording = false;

      // 初始化語音辨識
      if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.onresult = (e) => {
          stopMicStyle();
          compare(e.results[0][0].transcript);
        };
        recognition.onerror = () => stopMicStyle();
        recognition.onend = () => stopMicStyle();
      }

      async function init(topic) {
        try {
          await navigator.mediaDevices.getUserMedia({ audio: true });
          document.getElementById('topic-container').style.display = 'none';
          document.getElementById('loading').style.display = 'block';
          
          google.script.run
            .withSuccessHandler(data => {
              sentences = data;
              document.getElementById('loading').style.display = 'none';
              document.getElementById('practice-area').style.display = 'block';
              render();
            })
            .getGeminiSentences(topic);
        } catch (e) { alert("請允許麥克風權限以進行練習。"); }
      }

      function render() {
        currentIdx < 5 ? (
          document.getElementById('info').innerText = `主題題目 ${currentIdx + 1} / 5`,
          document.getElementById('status').innerText = "點擊麥克風後開始朗讀",
          document.getElementById('next-btn').style.display = 'none',
          document.getElementById('sentence-display').innerHTML = sentences[currentIdx].split(' ').map(w => `<span class="word">${w}</span>`).join(' '),
          playTTS()
        ) : (alert("全數完成！"), location.reload());
      }

      function playTTS() {
        const u = new SpeechSynthesisUtterance(sentences[currentIdx]);
        u.lang = 'en-US';
        u.rate = 0.8;
        speechSynthesis.speak(u);
      }

      function toggleMic() {
        if (!recognition) return alert("瀏覽器不支援語音辨識");
        if (isRecording) { recognition.stop(); } 
        else {
          isRecording = true;
          document.getElementById('mic-btn').classList.add('active');
          document.querySelectorAll('.word').forEach(s => s.className = 'word');
          recognition.start();
        }
      }

      function stopMicStyle() {
        isRecording = false;
        document.getElementById('mic-btn').classList.remove('active');
      }

      function compare(speech) {
        const clean = (t) => t.toLowerCase().replace(/[.,!?;]/g, '');
        const spokenWords = clean(speech).split(' ');
        const targetWords = sentences[currentIdx].split(' ');
        const spans = document.querySelectorAll('.word');
        
        targetWords.forEach((tw, i) => {
          if (i < spans.length) {
            spans[i].classList.add(spokenWords.includes(clean(tw)) ? 'correct' : 'wrong');
          }
        });
        document.getElementById('status').innerText = `辨識結果: "${speech}"`;
        document.getElementById('next-btn').style.display = 'block';
      }

      function goNext() { currentIdx++; render(); }
    </script>
  </body>
</html>
